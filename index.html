<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">

</head>

<body>

<main class="container">

    <!-- Header -->

    <header class="header">

        <h1>
            💰 Expense Tracker
        </h1>

        <button
            id="themeToggle"
            type="button"
            title="Toggle Theme"
            aria-label="Toggle Dark Mode">

            🌙

        </button>

    </header>



    <!-- Balance -->

    <section class="balance-box">

        <h3>Your Balance</h3>

        <h2 id="balance">
            ₹0
        </h2>

    </section>



    <!-- Summary -->

    <section class="summary">

        <div class="income">

            <h3>Income</h3>

            <p id="income">
                ₹0
            </p>

        </div>

        <div class="expense">

            <h3>Expense</h3>

            <p id="expense">
                ₹0
            </p>

        </div>

    </section>



    <!-- Add Transaction -->

    <section>

        <h3>Add Transaction</h3>

        <form id="transactionForm">

            <label for="text">
                Description
            </label>

            <input
                type="text"
                id="text"
                placeholder="Enter description"
                autocomplete="off"
                required
            >

            <label for="amount">
                Amount
            </label>

            <input
                type="number"
                id="amount"
                min="1"
                step="0.01"
                placeholder="Enter amount"
                required
            >

            <label for="type">
                Transaction Type
            </label>

            <select
                id="type"
                required
            >

                <option value="expense">
                    💸 Expense
                </option>

                <option value="income">
                    💰 Income
                </option>

            </select>

            <label for="category">
                Category
            </label>

            <select
                id="category"
                required
            >

                <option value="Food">
                    🍔 Food
                </option>

                <option value="Travel">
                    🚗 Travel
                </option>

                <option value="Shopping">
                    🛒 Shopping
                </option>

                <option value="Bills">
                    💡 Bills
                </option>

                <option value="Entertainment">
                    🎬 Entertainment
                </option>

                <option value="Other">
                    📦 Other
                </option>

            </select>

            <label for="date">
                Date
            </label>

            <input
                type="date"
                id="date"
                required
            >

            <div class="form-buttons">

                <button
                    type="submit"
                    id="submitButton">

                    Add Transaction

                </button>

                <button
                    type="button"
                    id="cancelEdit"
                    class="hidden">

                    Cancel

                </button>

            </div>

        </form>

    </section>



    <!-- Transaction History -->

    <section>

        <h3>Transaction History</h3>

        <!-- Filters -->

        <section
            class="filters"
            aria-label="Transaction Filters">

            <input
                type="text"
                id="search"
                placeholder="🔍 Search transaction"
                autocomplete="off"
            >

            <select id="filterType">

                <option value="all">
                    All Types
                </option>

                <option value="income">
                    💰 Income
                </option>

                <option value="expense">
                    💸 Expense
                </option>

            </select>

            <select id="filterCategory">

                <option value="all">
                    All Categories
                </option>

                <option value="Food">
                    🍔 Food
                </option>

                <option value="Travel">
                    🚗 Travel
                </option>

                <option value="Shopping">
                    🛒 Shopping
                </option>

                <option value="Bills">
                    💡 Bills
                </option>

                <option value="Entertainment">
                    🎬 Entertainment
                </option>

                <option value="Other">
                    📦 Other
                </option>

            </select>

        </section>



        <!-- Empty State -->

        <p id="emptyMessage">

            📂 No transactions yet.
            <br>
            Start by adding your first transaction.

        </p>

        <ul id="list"></ul>

    </section>



    <!-- Expense Chart -->

    <section class="chart-container">

        <h3>
            Expense Analysis
        </h3>

        <div class="chart-wrapper">

            <canvas id="expenseChart">

                Your browser does not support charts.

            </canvas>

        </div>

        <p
            id="chartMessage"
            class="hidden">

            📊 Add an expense to view the chart.

        </p>

    </section>

</main>

<!-- Chart.js -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Main JavaScript -->

<script src="script.js"></script>

</body>

</html>
