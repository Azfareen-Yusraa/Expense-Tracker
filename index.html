<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Expense Tracker</h1>

    <div class="balance-box">

        <h3>Your Balance</h3>
        <h2 id="balance">
            ₹0
        </h2>

    </div>


    <div class="summary">

        <div class="income">
            <h3>Income</h3>
            <p id="income">
                ₹0
            </p>
        </div>


        <div class="expense">
            <h3>Expense</h3>
            <p id="expense">
                ₹0
            </p>
        </div>

    </div>



    <h3>Add Transaction</h3>

    <input 
    type="text" 
    id="text"
    placeholder="Enter description">


    <input 
    type="number"
    id="amount"
    placeholder="Amount">


    <button onclick="addTransaction()">
        Add Transaction
    </button>



    <h3>Transaction History</h3>


    <ul id="list">

    </ul>


</div>


<script src="script.js"></script>

</body>

</html>
