<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


    <div class="header">

    <h1>💰 Expense Tracker</h1>

    <button id="themeToggle">
        🌙
    </button>

</div>



    <!-- Balance Section -->

    <div class="balance-box">

        <h3>Your Balance</h3>

        <h2 id="balance">
            ₹0
        </h2>

    </div>



    <!-- Income Expense Summary -->

    <div class="summary">


        <div class="income">

            <h3>Income</h3>

            <p id="income">
                ₹0
            </p>

        </div>



        <div class="expense">

            <h3>Expense</h3>

            <p id="expense">
                ₹0
            </p>

        </div>


    </div>




    <!-- Add Transaction -->

    <h3>Add Transaction</h3>


    <form id="transactionForm">


        <input
        type="text"
        id="text"
        placeholder="Enter description"
        required>



        <input
type="number"
id="amount"
placeholder="Enter amount"
required>



<select id="type">


    <option value="expense">
        💸 Expense
    </option>


    <option value="income">
        💰 Income
    </option>


</select>



        <select id="category">


            <option value="Food">
                🍔 Food
            </option>


            <option value="Travel">
                🚗 Travel
            </option>


            <option value="Shopping">
                🛒 Shopping
            </option>


            <option value="Bills">
                💡 Bills
            </option>


            <option value="Entertainment">
                🎬 Entertainment
            </option>


            <option value="Other">
                📦 Other
            </option>


        </select>




        <input
        type="date"
        id="date"
        required>




        <button type="submit">
            Add Transaction
        </button>


    </form>





    <!-- Transaction History -->


    <!-- Transaction History -->

<h3>
    Transaction History
</h3>


<div class="filters">


<input 
type="text"
id="search"
placeholder="🔎 Search transaction">



<select id="filterType">

<option value="all">
All Types
</option>


<option value="income">
💰 Income
</option>


<option value="expense">
💸 Expense
</option>


</select>



<select id="filterCategory">


<option value="all">
All Categories
</option>


<option value="Food">
🍔 Food
</option>


<option value="Travel">
🚗 Travel
</option>


<option value="Shopping">
🛒 Shopping
</option>


<option value="Bills">
💡 Bills
</option>


<option value="Entertainment">
🎬 Entertainment
</option>


<option value="Other">
📦 Other
</option>


</select>


</div>



<ul id="list">

</ul>

    <!-- Chart Section -->


    <div class="chart-container">


        <h3>
            Expense Analysis
        </h3>


        <canvas id="expenseChart"></canvas>


    </div>




</div>





<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script src="script.js"></script>


</body>


</html>
